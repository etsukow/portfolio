# Pull & run the published image on your own server:
#   docker compose pull && docker compose up -d
#
# The image is built and pushed to GHCR by GitHub Actions on every push to main.
services:
  portfolio:
    image: ghcr.io/etsukow/portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    ports:
      # host:container — change the host port to fit your setup / reverse proxy.
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

    # --- Optional: expose through Traefik instead of a published port ---
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.portfolio.rule=Host(`etsu.dev`)"
    #   - "traefik.http.routers.portfolio.entrypoints=websecure"
    #   - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.portfolio.loadbalancer.server.port=80"

