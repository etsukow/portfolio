# Pull & run the published image on the server:
#   cd /opt/portfolio && docker compose pull && docker compose up -d
#
# The image is built and pushed to GHCR by GitHub Actions on every push to main,
# then this same file on the server (/opt/portfolio) pulls & restarts it.
# The host nginx reverse-proxies etsukow.com -> 127.0.0.1:8080 (TLS via Certbot).
services:
  portfolio:
    image: ghcr.io/etsukow/portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
