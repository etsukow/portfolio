server {
	listen 80;
	listen [::]:80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	# Security headers (applied to HTML responses).
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

	# Compression.
	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_comp_level 6;
	gzip_types
		text/plain
		text/css
		application/javascript
		application/json
		image/svg+xml
		application/wasm
		model/gltf-binary
		font/woff2;

	# Hashed, immutable build assets — cache aggressively.
	location /_app/immutable/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
		access_log off;
		try_files $uri =404;
	}

	# Media & fonts — cache for a month.
	location ~* \.(?:glb|gltf|woff2?|png|jpe?g|webp|gif|ico)$ {
		add_header Cache-Control "public, max-age=2592000";
		access_log off;
		try_files $uri =404;
	}

	# App shell — never cache the HTML so deploys are picked up instantly.
	# `expires` (unlike add_header) does not reset inherited security headers.
	location / {
		expires -1;
		try_files $uri $uri/ /index.html;
	}

	error_page 404 /404.html;
}
