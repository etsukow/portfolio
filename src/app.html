<!doctype html>
<html lang="en" data-theme="mocha">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1e1e2e" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />

		<!-- Anti-FOUC: apply the saved/preferred theme before first paint -->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var system = matchMedia('(prefers-color-scheme: light)').matches
						? 'latte'
						: 'mocha';
					var theme = stored === 'latte' || stored === 'mocha' ? stored : system;
					document.documentElement.setAttribute('data-theme', theme);
					document
						.querySelector('meta[name="theme-color"]')
						.setAttribute('content', theme === 'latte' ? '#eff1f5' : '#1e1e2e');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
